<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Duel Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<a href="index.html" class="back-btn">← BACK</a>

<h1>Duel Memories</h1>

<!-- スライダー1 -->
<div class="slider">
  <button class="arrow left" onclick="prevSlide(0)">◀</button>
  <img id="slide0" class="slide-img">
  <button class="arrow right" onclick="nextSlide(0)">▶</button>
</div>

<!-- スライダー2 -->
<div class="slider">
  <button class="arrow left" onclick="prevSlide(1)">◀</button>
  <img id="slide1" class="slide-img">
  <button class="arrow right" onclick="nextSlide(1)">▶</button>
</div>

<!-- スライダー3 -->
<div class="slider">
  <button class="arrow left" onclick="prevSlide(2)">◀</button>
  <img id="slide2" class="slide-img">
  <button class="arrow right" onclick="nextSlide(2)">▶</button>
</div>

<!-- スライダー写真管理 -->
<script>
const images = [
  ["dp01.jpg","dp02.jpg","dp03.jpg","dp04.jpg","dp05.jpg","dp06.jpg","dp07.jpg","dp08.jpg","dp09.jpg","dp10.jpg","dp11.jpg","dp12.jpg","dp13.jpg","dp14.jpg","dp15.jpg","dp16.jpg","dp17.jpg","dp18.jpg","dp19.jpg","dp20.jpg","dp21.jpg","dp22.jpg","dp23.jpg","dp24.jpg","dp25.jpg","dp26.jpg"],
  ["img7.jpg","img8.jpg","img9.jpg","img10.jpg","img11.jpg","img12.jpg"],
  ["img13.jpg","img14.jpg","img15.jpg","img16.jpg","img17.jpg","img18.jpg"]
];

let index = [0, 0, 0];

function show(i){
  document.getElementById("slide" + i).src = images[i][index[i]];
}

// 初期表示
window.onload = () => {
  show(0);
  show(1);
  show(2);
};

function nextSlide(i){
  index[i] = (index[i] + 1) % images[i].length;
  show(i);
}

function prevSlide(i){
  index[i] = (index[i] - 1 + images[i].length) % images[i].length;
  show(i);
}
</script>

</body>
</html>
